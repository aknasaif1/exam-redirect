<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توجيه الحجز للامتحان الوطني</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #f4f7f6;
            margin: 0;
            padding: 50px 20px;
            text-align: center;
        }
        .container {
            background-color: #ffffff;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 25px;
        }
        label {
            display: block;
            text-align: right;
            margin-bottom: 8px;
            font-weight: bold;
            color: #34495e;
        }
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #fff;
        }
        button {
            width: 100%;
            background-color: #3498db;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #2980b9;
        }
        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>نظام توجيه الحجز للامتحان الوطني</h2>
        
        <label for="universitySelect">اختر الجامعة للتوجه إلى رابط الحجز:</label>
        <select id="universitySelect">
            <option value="">-- اختر الجامعة المعنية --</option>
            <option value="https://inpt.rdd.edu.iq/VExamExaminationCenters?id=fc77c58c-06de-6d05-093d-3a11060c67eb">جامعة بغداد</option>
            <option value="https://example.com/uomus">الجامعة المستنصرية</option>
            <option value="https://example.com/uobasrah">جامعة البصرة</option>
            <option value="https://example.com/uomosul">جامعة الموصل</option>
        </select>
        
        <button onclick="redirectToUniversity()">الذهاب إلى موقع الحجز</button>
        
        <div class="footer">
            <p>تم تخصيص هذه الصفحة لتسهيل الوصول المباشر.</p>
        </div>
    </div>

    <script>
        function redirectToUniversity() {
            var selectedUrl = document.getElementById("universitySelect").value;
            if (selectedUrl) {
                window.location.href = selectedUrl;
            } else {
                alert("يرجى اختيار الجامعة أولاً من القائمة.");
            }
        }
    </script>

</body>
</html>
